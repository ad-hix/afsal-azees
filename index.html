<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Blood Donation</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {font-family: Arial; background:#f5f5f5;}
header {background:#c62828;color:white;padding:15px;text-align:center;font-size:22px;}
.card {background:white;padding:20px;margin:20px auto;max-width:420px;border-radius:10px;}
input,select {width:100%;padding:10px;margin-top:10px;}
button {width:100%;padding:10px;margin-top:10px;background:#c62828;color:white;border:none;border-radius:5px;}
#map {height:300px;margin-top:10px;border-radius:10px;}
.result {background:#ffeaea;padding:10px;margin-top:10px;border-radius:8px;}
</style>
</head>

<body>

<header>🩸 Smart Blood Donation System</header>

<!-- LOGIN -->
<div class="card">
<h2>Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- REGISTER -->
<div class="card">
<h2>Register Donor</h2>
<input id="name" placeholder="Name">
<select id="blood">
<option value="">Blood Group</option>
<option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
<option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
</select>
<input id="location" placeholder="Location">
<input id="contact" placeholder="Contact">

<button onclick="getLocation()">📍 Get My Location</button>
<button onclick="registerDonor()">Register</button>

<div id="map"></div>
</div>

<!-- SEARCH -->
<div class="card">
<h2>Find Blood</h2>
<select id="searchBlood">
<option value="">Select Blood</option>
<option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
<option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
</select>
<button onclick="searchDonor()">Search</button>
<div id="results"></div>
</div>

<script>
/* 🔥 ADD YOUR FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "https://YOUR_PROJECT.firebaseio.com",
projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* AUTH */
function signup(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(!email || !password){
alert("Enter email & password");
return;
}

auth.createUserWithEmailAndPassword(email,password)
.then(()=>alert("Signup Success"))
.catch(e=>alert(e.message));
}

function login(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>alert("Login Success"))
.catch(e=>alert(e.message));
}

/* REGISTER */
function registerDonor(){

let name = document.getElementById("name").value;
let blood = document.getElementById("blood").value;
let location = document.getElementById("location").value;
let contact = document.getElementById("contact").value;

if(!name || !blood || !location || !contact){
alert("⚠️ Fill all fields");
return;
}

let id = Date.now();

db.ref("donors/" + id).set({
name: name,
blood: blood,
location: location,
contact: contact
})
.then(()=>alert("✅ Registered Successfully"))
.catch(err=>alert(err.message));
}

/* SEARCH */
function searchDonor(){

let group = document.getElementById("searchBlood").value;
let results = document.getElementById("results");

results.innerHTML = "Loading...";

db.ref("donors").once("value", snap=>{
results.innerHTML="";

snap.forEach(child=>{
let d = child.val();

if(d.blood === group){
results.innerHTML += `
<div class="result">
<strong>${d.name}</strong><br>
🩸 ${d.blood}<br>
📍 ${d.location}<br>
📞 ${d.contact}
</div>`;
}
});

if(results.innerHTML===""){
results.innerHTML="No donors found";
}
});

}

/* GPS + MAP */
let map;

function getLocation(){

if(!navigator.geolocation){
alert("Geolocation not supported");
return;
}

navigator.geolocation.getCurrentPosition(
async function(position){

let lat = position.coords.latitude;
let lon = position.coords.longitude;

/* Show coordinates first */
document.getElementById("location").value = lat + ", " + lon;

/* Convert to address */
try{
let res = await fetch(
`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
);
let data = await res.json();

let city = data.address.city || data.address.town || data.address.village || "";
let state = data.address.state || "";
let country = data.address.country || "";

document.getElementById("location").value =
city + ", " + state + ", " + country;

}catch{
console.log("Address fetch failed");
}

/* Load map */
if(!map){
map = L.map('map').setView([lat, lon], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);
}

map.setView([lat, lon], 13);

L.marker([lat, lon]).addTo(map)
.bindPopup("📍 You are here")
.openPopup();

},
function(error){
alert("❌ Location permission denied");
}
);

}
</script>

</body>
</html>
