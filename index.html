<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Blood Donation</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
font-family: Arial;
background: linear-gradient(135deg,#ffeaea,#fff);
cursor: url('https://cdn-icons-png.flaticon.com/32/833/833472.png'), auto;
}

/* HEADER */
header {
background: linear-gradient(135deg,#c62828,#ff5252);
color:white;
padding:20px;
text-align:center;
font-size:24px;
animation: fadeIn 1s;
}

/* CARD */
.card {
background:white;
padding:20px;
margin:20px auto;
max-width:420px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation: slideUp 0.8s;
}

input,select {
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* BUTTON */
button {
width:100%;
padding:12px;
margin-top:10px;
background:linear-gradient(135deg,#c62828,#ff5252);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover {
transform: scale(1.05);
}

/* MAP */
#map {
height:300px;
margin-top:10px;
border-radius:10px;
}

/* RESULT */
.result {
background:#ffeaea;
padding:10px;
margin-top:10px;
border-radius:10px;
}

/* ANIMATION */
@keyframes fadeIn {
from {opacity:0;}
to {opacity:1;}
}

@keyframes slideUp {
from {transform:translateY(50px);opacity:0;}
to {transform:translateY(0);opacity:1;}
}
</style>
</head>

<body>

<header>🩸 Smart Blood Donation System</header>

<div class="card">
<h2>Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div class="card">
<h2>Register Donor</h2>
<input id="name" placeholder="Name">
<select id="blood">
<option value="">Blood Group</option>
<option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
<option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
</select>
<input id="location" placeholder="Location">
<input id="contact" placeholder="Contact">

<button onclick="getLocation()">📍 Get Location</button>
<button onclick="registerDonor()">Register</button>

<div id="map"></div>
</div>

<div class="card">
<h2>Find Blood</h2>
<select id="searchBlood">
<option value="">Select Blood</option>
<option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
<option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
</select>
<button onclick="searchDonor()">Search</button>
<div id="results"></div>
</div>

<script>
/* 🔥 PUT YOUR FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "https://YOUR_PROJECT.firebaseio.com",
projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* AUTH */
function signup(){
let email = emailInput();
let password = passInput();

auth.createUserWithEmailAndPassword(email,password)
.then(()=>alert("✅ Signup Success"))
.catch(e=>alert(e.message));
}

function login(){
let email = emailInput();
let password = passInput();

auth.signInWithEmailAndPassword(email,password)
.then(()=>alert("✅ Login Success"))
.catch(e=>alert(e.message));
}

function emailInput(){
return document.getElementById("email").value;
}
function passInput(){
return document.getElementById("password").value;
}

/* REGISTER */
function registerDonor(){

let user = auth.currentUser;

if(!user){
alert("⚠️ Please login first");
return;
}

let name = document.getElementById("name").value;
let blood = document.getElementById("blood").value;
let location = document.getElementById("location").value;
let contact = document.getElementById("contact").value;

if(!name || !blood || !location || !contact){
alert("⚠️ Fill all fields");
return;
}

let id = Date.now();

db.ref("donors/" + id).set({
name, blood, location, contact, user: user.email
})
.then(()=>{
alert("🎉 Donor Registered!");
})
.catch(err=>{
alert("❌ Error: " + err.message);
});

}

/* SEARCH */
function searchDonor(){
let group = document.getElementById("searchBlood").value;
let results = document.getElementById("results");

results.innerHTML="Loading...";

db.ref("donors").once("value", snap=>{
results.innerHTML="";

snap.forEach(child=>{
let d = child.val();

if(d.blood === group){
results.innerHTML += `
<div class="result">
<strong>${d.name}</strong><br>
🩸 ${d.blood}<br>
📍 ${d.location}<br>
📞 ${d.contact}
</div>`;
}
});

if(results.innerHTML===""){
results.innerHTML="No donors found";
}
});
}

/* GPS */
let map;

function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

document.getElementById("location").value = lat+","+lon;

if(!map){
map = L.map('map').setView([lat, lon], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

map.setView([lat, lon], 13);
L.marker([lat, lon]).addTo(map);

/* Address */
try{
let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
let data = await res.json();
document.getElementById("location").value =
(data.address.city || "") + ", " + (data.address.state || "");
}catch{}
});
}
</script>

</body>
</html>
