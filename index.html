<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Blood Donation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #c62828, #e53935);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    letter-spacing: 1px;
    animation: fadeDown 1s ease;
}

@keyframes fadeDown {
    from {opacity:0; transform: translateY(-30px);}
    to {opacity:1; transform: translateY(0);}
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: center;
    background: #b71c1c;
}

nav button {
    background: none;
    border: none;
    color: white;
    padding: 15px 20px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

nav button:hover {
    background: #7f0000;
}

/* HERO */
.hero {
    background: url('https://images.unsplash.com/photo-1584515933487-779824d29309') no-repeat center/cover;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.hero h1 {
    background: rgba(0,0,0,0.5);
    padding: 15px 25px;
    border-radius: 10px;
    animation: fadeUp 1.5s ease;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(40px);}
    to {opacity:1; transform: translateY(0);}
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    margin: 20px auto;
    max-width: 420px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    animation: fadeUp 0.8s ease;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button.submit {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #c62828;
    color: white;
    border: none;
    border-radius: 8px;
    transition: 0.3s;
}

button.submit:hover {
    background: #8e0000;
    transform: scale(1.05);
}

/* HIDDEN */
.hidden {
    display: none;
}

/* RESULT CARD */
.result {
    background: #ffeaea;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    animation: fadeUp 0.5s ease;
}
</style>
</head>

<body>

<header>🩸 Smart Blood Donation System</header>

<nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('register')">Register</button>
    <button onclick="showSection('search')">Find Blood</button>
</nav>

<div class="hero">
    <h1>Save Lives with a Drop of Blood ❤️</h1>
</div>

<div class="container">

<!-- HOME -->
<div id="home">
    <div class="card">
        <h2>Welcome</h2>
        <p>This platform connects donors and patients instantly during emergencies.</p>
    </div>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
    <div class="card">
        <h2>Become a Donor</h2>
        <input type="text" id="name" placeholder="Full Name">
        <select id="blood">
            <option value="">Select Blood Group</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option>
            <option>AB+</option><option>AB-</option>
        </select>
        <input type="text" id="location" placeholder="Location">
        <input type="text" id="contact" placeholder="Contact Number">
        <button class="submit" onclick="registerDonor()">Register</button>
    </div>
</div>

<!-- SEARCH -->
<div id="search" class="hidden">
    <div class="card">
        <h2>Find Blood</h2>
        <select id="searchBlood">
            <option value="">Select Blood Group</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option>
            <option>AB+</option><option>AB-</option>
        </select>
        <button class="submit" onclick="searchDonor()">Search</button>
        <div id="results"></div>
    </div>
</div>

</div>

<script>
let donors = [];

function showSection(section) {
    document.getElementById('home').classList.add('hidden');
    document.getElementById('register').classList.add('hidden');
    document.getElementById('search').classList.add('hidden');

    document.getElementById(section).classList.remove('hidden');
}

function registerDonor() {
    let name = document.getElementById('name').value;
    let blood = document.getElementById('blood').value;
    let location = document.getElementById('location').value;
    let contact = document.getElementById('contact').value;

    if (!name || !blood || !location || !contact) {
        alert("Please fill all fields");
        return;
    }

    donors.push({ name, blood, location, contact });

    alert("✅ Donor Registered Successfully!");
    
    document.getElementById('name').value = "";
    document.getElementById('blood').value = "";
    document.getElementById('location').value = "";
    document.getElementById('contact').value = "";
}

function searchDonor() {
    let blood = document.getElementById('searchBlood').value;
    let results = document.getElementById('results');

    results.innerHTML = "";

    let filtered = donors.filter(d => d.blood === blood);

    if (filtered.length === 0) {
        results.innerHTML = "<p>No donors found</p>";
        return;
    }

    filtered.forEach(d => {
        results.innerHTML += `
            <div class="result">
                <strong>${d.name}</strong><br>
                🩸 ${d.blood}<br>
                📍 ${d.location}<br>
                📞 ${d.contact}
            </div>`;
    });
}
</script>

</body>
</html>
